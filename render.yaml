# render.yaml — Deploy backend to Render.com
# Place this file in the ROOT of your repo (not inside /backend)

services:
  - type: web
    name: nexuschat-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false   # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLIENT_URL
        sync: false   # Set to your Vercel frontend URL
